<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>방문객 예약 시스템</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
  background: #f5f5f3; color: #1a1a18; min-height: 100vh;
}

/* ── 로그인 ───────────────────────────────────── */
#loginPage {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1.5rem;
}
.login-card {
  background: #fff; border: 0.5px solid #e0dfd8; border-radius: 16px;
  padding: 2.5rem 2rem; width: 100%; max-width: 400px;
}
.login-logo {
  width: 44px; height: 44px; border-radius: 12px; background: #EEEDFE;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.25rem;
}
.login-logo svg { width: 22px; height: 22px; }
.login-card h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; color: #1a1a18; }
.login-card .sub { font-size: 14px; color: #888; margin-bottom: 1.75rem; }
.fgroup { margin-bottom: 14px; }
.fgroup label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
.fgroup input {
  width: 100%; padding: 10px 12px; font-size: 14px;
  border: 0.5px solid #d0cfca; border-radius: 8px;
  outline: none; background: #fff; color: #1a1a18;
  transition: border-color 0.15s;
}
.fgroup input:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.1); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-login {
  width: 100%; padding: 11px; font-size: 15px; font-weight: 500;
  border: none; border-radius: 9px; background: #534AB7; color: #fff;
  cursor: pointer; margin-top: 8px; transition: background 0.15s;
}
.btn-login:hover { background: #3C3489; }
.btn-login:disabled { background: #AFA9EC; cursor: not-allowed; }
.login-error { font-size: 13px; color: #A32D2D; margin-top: 10px; text-align: center; min-height: 18px; }

/* ── 앱 ──────────────────────────────────────── */
#appPage { display: none; max-width: 800px; margin: 0 auto; padding: 1.75rem 1rem 3rem; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2rem; gap: 12px;
}
.topbar-left h1 { font-size: 20px; font-weight: 500; margin-bottom: 2px; }
.topbar-left .user-info { font-size: 13px; color: #888; }
.user-badge {
  background: #EEEDFE; border-radius: 8px; padding: 6px 12px;
  font-size: 13px; color: #3C3489; font-weight: 500;
}
.btn-logout {
  font-size: 13px; padding: 6px 12px; border: 0.5px solid #d0cfca;
  border-radius: 7px; cursor: pointer; background: #fff; color: #555;
  transition: background 0.15s; margin-left: 8px;
}
.btn-logout:hover { background: #f5f5f3; }

.sec-label {
  font-size: 11px; font-weight: 500; color: #aaa;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
}

/* 날짜 탭 */
.date-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.dtab {
  padding: 7px 15px; font-size: 14px; border: 0.5px solid #d0cfca;
  border-radius: 8px; cursor: pointer; background: #fff; color: #1a1a18;
  transition: all 0.12s;
}
.dtab:hover { background: #f5f5f3; }
.dtab.active { background: #EEEDFE; border-color: #534AB7; color: #3C3489; font-weight: 500; }

/* 슬롯 그리드 */
.slots-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.slot-card {
  background: #fff; border: 0.5px solid #e0dfd8; border-radius: 11px; padding: 14px;
  transition: border-color 0.15s;
}
.slot-card.mine { border-color: #5DCAA5; background: #f2fdf8; }
.slot-time { font-size: 16px; font-weight: 500; color: #1a1a18; margin-bottom: 3px; }
.slot-meta { font-size: 12px; color: #aaa; margin-bottom: 10px; }
.dots { display: flex; gap: 6px; margin-bottom: 11px; }
.dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid #d0cfca; background: #fff; }
.dot.filled { background: #534AB7; border-color: #534AB7; }
.dot.mine-dot { background: #1D9E75; border-color: #1D9E75; }
.slot-btn {
  width: 100%; padding: 7px; font-size: 13px;
  border: 0.5px solid #d0cfca; border-radius: 7px;
  cursor: pointer; background: #fff; color: #1a1a18; transition: all 0.12s;
}
.slot-btn:hover:not(:disabled) { background: #EEEDFE; border-color: #534AB7; color: #3C3489; }
.slot-btn:disabled { opacity: 0.38; cursor: not-allowed; }
.slot-btn.cancel { border-color: #F09595; color: #A32D2D; }
.slot-btn.cancel:hover { background: #FCEBEB; }
.lunch-bar {
  grid-column: 1 / -1; text-align: center; font-size: 13px; color: #aaa;
  background: #fafaf8; border: 0.5px dashed #d0cfca; border-radius: 8px; padding: 9px;
}

/* 예약 폼 */
.bform {
  background: #fafaf8; border: 0.5px solid #e0dfd8; border-radius: 13px;
  padding: 1.25rem; margin-bottom: 1.5rem; display: none;
}
.bform.open { display: block; }
.bform h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #1a1a18; }
.bform-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.bform-full { margin-bottom: 12px; }
.bform label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
.bform input {
  width: 100%; padding: 9px 11px; font-size: 14px;
  border: 0.5px solid #d0cfca; border-radius: 7px;
  background: #fff; color: #1a1a18; outline: none;
}
.bform input:focus { border-color: #534AB7; }
.bform-actions { display: flex; gap: 8px; }
.btn-confirm {
  padding: 9px 22px; font-size: 14px; border: none;
  border-radius: 8px; background: #534AB7; color: #fff; cursor: pointer;
}
.btn-confirm:hover { background: #3C3489; }
.btn-cf-cancel {
  padding: 9px 14px; font-size: 14px; border: 0.5px solid #d0cfca;
  border-radius: 8px; background: #fff; color: #555; cursor: pointer;
}

/* 내 예약 */
.res-list { display: flex; flex-direction: column; gap: 8px; }
.res-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 15px; background: #E1F5EE;
  border: 0.5px solid #5DCAA5; border-radius: 10px; gap: 12px;
}
.res-main { font-size: 14px; font-weight: 500; color: #085041; }
.res-sub { font-size: 12px; color: #0F6E56; margin-top: 3px; }
.btn-res-cancel {
  font-size: 12px; padding: 5px 11px; white-space: nowrap;
  border: 0.5px solid #5DCAA5; border-radius: 6px;
  background: #fff; color: #0F6E56; cursor: pointer;
}
.btn-res-cancel:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.empty { font-size: 14px; color: #aaa; padding: 4px 0; }
.loading { font-size: 14px; color: #ccc; padding: 4px 0; }

/* 토스트 */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #534AB7; color: #fff; padding: 10px 22px;
  border-radius: 9px; font-size: 14px; opacity: 0;
  pointer-events: none; z-index: 999; transition: opacity 0.2s;
  white-space: nowrap;
}
#toast.show { opacity: 1; }
#toast.err { background: #A32D2D; }

@media (max-width: 500px) {
  .bform-row { grid-template-columns: 1fr; }
  .slots-grid { grid-template-columns: repeat(2, 1fr); }
  .row2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ══ 로그인 ══════════════════════════════════════ -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
    </div>
    <h1>방문객 예약</h1>
    <p class="sub">계약자 정보를 입력하여 예약을 진행해주세요.</p>

    <div class="fgroup">
      <label>계약자 이름</label>
      <input type="text" id="iName" placeholder="홍길동" />
    </div>
    <div class="row2">
      <div class="fgroup">
        <label>동 (숫자만)</label>
        <input type="text" id="iDong" placeholder="101" />
      </div>
      <div class="fgroup">
        <label>호 (숫자만)</label>
        <input type="text" id="iHo" placeholder="201" />
      </div>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">확인</button>
    <p class="login-error" id="loginErr"></p>
  </div>
</div>

<!-- ══ 예약 앱 ══════════════════════════════════════ -->
<div id="appPage">
  <div class="topbar">
    <div class="topbar-left">
      <h1>방문객 예약</h1>
      <div class="user-info">10:00 ~ 15:00 · 점심(12~13시) 제외 · 30분 단위 · 최대 2명</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="user-badge" id="userBadge"></div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="sec-label">날짜 선택</div>
  <div class="date-tabs" id="dateTabs"></div>

  <div class="sec-label">시간 선택</div>
  <div class="slots-grid" id="slotsGrid"><p class="loading">불러오는 중...</p></div>

  <div class="bform" id="bform">
    <h3 id="bformTitle">예약 정보 입력</h3>
    <div class="bform-row">
      <div>
        <label>방문자 이름 *</label>
        <input type="text" id="fVName" placeholder="방문자 이름" />
      </div>
      <div>
        <label>방문자 연락처</label>
        <input type="text" id="fVPhone" placeholder="010-0000-0000" />
      </div>
    </div>
    <div class="bform-full">
      <label>방문 목적</label>
      <input type="text" id="fVPurpose" placeholder="미팅, 계약 상담 등" />
    </div>
    <div class="bform-actions">
      <button class="btn-confirm" onclick="submitBooking()">예약 확정</button>
      <button class="btn-cf-cancel" onclick="closeForm()">취소</button>
    </div>
  </div>

  <div class="sec-label" style="margin-top:1.75rem;">내 예약 내역</div>
  <div class="res-list" id="resList"><p class="empty">예약 내역이 없습니다.</p></div>
</div>

<div id="toast"></div>

<script>
// ══ 설정 ════════════════════════════════════════════
// Apps Script 배포 후 받은 웹 앱 URL로 교체하세요
const API_URL = 'https://script.google.com/macros/s/AKfycbw_YzTK3vHv0aPd29eJ9dKiPbWjN5W0ZT6znmy5QZ9zRDV3Han54BZFkjVMdB4cmmkb/exec';

const SLOTS = ['10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30'];
const MAX   = 2;

// ══ 상태 ════════════════════════════════════════════
let user = JSON.parse(sessionStorage.getItem('user') || 'null');
let selDate = null;
let pendingSlot = null;
let myBookings = [];

// ══ 초기화 ══════════════════════════════════════════
(function() {
  if (user) showApp();
  else showLogin();
})();

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display   = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display   = 'block';
  document.getElementById('userBadge').textContent   = `${user.name} · ${user.dong} ${user.ho}`;
  buildDateTabs();
  loadMyBookings();
}

// ══ 로그인 ══════════════════════════════════════════
async function doLogin() {
  const name = document.getElementById('iName').value.trim();
  const dong = document.getElementById('iDong').value.trim();
  const ho   = document.getElementById('iHo').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';

  if (!name || !dong || !ho) { errEl.textContent = '모든 항목을 입력해주세요.'; return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '확인 중...';

  try {
    const res = await apiFetch('GET', { action: 'verify', name, dong, ho });
    if (!res.ok) { errEl.textContent = res.error; return; }
    if (!res.verified) { errEl.textContent = '일치하는 계약자 정보가 없습니다. 이름, 동, 호를 다시 확인해주세요.'; return; }
    user = { name, dong, ho, phone: res.phone || '' };
    sessionStorage.setItem('user', JSON.stringify(user));
    showApp();
  } catch {
    errEl.textContent = '서버에 연결할 수 없습니다.';
  } finally {
    btn.disabled = false; btn.textContent = '확인';
  }
}

function doLogout() {
  user = null;
  sessionStorage.removeItem('user');
  showLogin();
}

// ══ 날짜 탭 ════════════════════════════════════════
function buildDateTabs() {
  const wrap = document.getElementById('dateTabs');
  wrap.innerHTML = '';
  const today = new Date();
  const WD = ['일','월','화','수','목','금','토'];

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const lbl = i === 0 ? '오늘'
              : i === 1 ? '내일'
              : `${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;
    const btn = document.createElement('button');
    btn.className = 'dtab' + (i === 0 ? ' active' : '');
    btn.textContent = lbl;
    btn.onclick = () => selectDate(key, btn);
    wrap.appendChild(btn);
    if (i === 0) { selDate = key; loadSlots(key); }
  }
}

function selectDate(date, btn) {
  selDate = date;
  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closeForm();
  loadSlots(date);
}

// ══ 슬롯 ════════════════════════════════════════════
async function loadSlots(date) {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '<p class="loading">불러오는 중...</p>';
  try {
    const res = await apiFetch('GET', { action: 'slots', date, name: user.name, dong: user.dong, ho: user.ho });
    if (!res.ok) { grid.innerHTML = `<p class="empty">${res.error}</p>`; return; }
    renderSlots(res.slots);
  } catch {
    grid.innerHTML = '<p class="empty">슬롯을 불러오지 못했습니다.</p>';
  }
}

function renderSlots(slots) {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '';

  slots.forEach((slot, idx) => {
    if (idx === 4) {
      const bar = document.createElement('div');
      bar.className = 'lunch-bar';
      bar.textContent = '점심시간 12:00 ~ 13:00 · 예약 불가';
      grid.appendChild(bar);
    }

    const card = document.createElement('div');
    card.className = 'slot-card' + (slot.is_mine ? ' mine' : '');

    let statusText, statusColor;
    if (slot.is_mine) {
      statusText = '예약완료 (내 예약)'; statusColor = '#0F6E56';
    } else if (!slot.available) {
      statusText = '마감'; statusColor = '#A32D2D';
    } else {
      statusText = '예약 가능'; statusColor = '#534AB7';
    }

    let btnHtml;
    if (slot.is_mine) {
      btnHtml = `<button class="slot-btn cancel" onclick="cancelBooking('${slot.booking_id}')">예약 취소</button>`;
    } else if (!slot.available) {
      btnHtml = `<button class="slot-btn" disabled>마감</button>`;
    } else {
      btnHtml = `<button class="slot-btn" onclick="openForm('${slot.time}')">예약하기</button>`;
    }

    card.innerHTML = `<div class="slot-time">${slot.time}</div>
      <div class="slot-meta" style="color:${statusColor};font-weight:500;">${statusText}</div>
      ${btnHtml}`;
    grid.appendChild(card);
  });
}

// ══ 예약 폼 ═════════════════════════════════════════
function openForm(time) {
  pendingSlot = time;
  document.getElementById('bformTitle').textContent = `${selDate} ${time} 예약 정보 입력`;
  document.getElementById('fVName').value    = user.name || '';
  document.getElementById('fVPhone').value   = user.phone || '';
  document.getElementById('fVPurpose').value = '';
  document.getElementById('bform').classList.add('open');
  document.getElementById('fVPurpose').focus();
}

function closeForm() {
  pendingSlot = null;
  document.getElementById('bform').classList.remove('open');
}

async function submitBooking() {
  const visitor_name  = document.getElementById('fVName').value.trim();
  const visitor_phone = document.getElementById('fVPhone').value.trim();
  const purpose       = document.getElementById('fVPurpose').value.trim();
  if (!visitor_name) { showToast('방문자 이름을 입력해주세요.', true); return; }

  try {
    const res = await apiFetch('POST', {
      action: 'book', date: selDate, time: pendingSlot,
      name: user.name, dong: user.dong, ho: user.ho,
      visitor_name, visitor_phone, purpose
    });
    if (!res.ok) { showToast(res.error, true); return; }
    closeForm();
    showToast('예약이 완료되었습니다.');
    loadSlots(selDate);
    loadMyBookings();
  } catch {
    showToast('서버 오류가 발생했습니다.', true);
  }
}

// ══ 내 예약 ═════════════════════════════════════════
async function loadMyBookings() {
  try {
    const res = await apiFetch('GET', { action: 'mine', name: user.name, dong: user.dong, ho: user.ho });
    myBookings = res.bookings || [];
    renderMyBookings();
  } catch {}
}

function renderMyBookings() {
  const list = document.getElementById('resList');
  if (!myBookings.length) { list.innerHTML = '<p class="empty">예약 내역이 없습니다.</p>'; return; }
  list.innerHTML = myBookings.map(b => `
    <div class="res-item">
      <div>
        <div class="res-main">${b.date} ${b.time}</div>
        <div class="res-sub">${b.visitor_name}${b.visitor_phone ? ' · '+b.visitor_phone : ''}${b.purpose ? ' · '+b.purpose : ''}</div>
      </div>
      <button class="btn-res-cancel" onclick="cancelBooking('${b.id}')">취소</button>
    </div>`).join('');
}

async function cancelBooking(booking_id) {
  if (!booking_id || !confirm('예약을 취소하시겠습니까?')) return;
  try {
    const res = await apiFetch('POST', {
      action: 'cancel', booking_id,
      name: user.name, dong: user.dong, ho: user.ho
    });
    if (!res.ok) { showToast(res.error, true); return; }
    showToast('예약이 취소되었습니다.');
    loadSlots(selDate);
    loadMyBookings();
  } catch {
    showToast('서버 오류가 발생했습니다.', true);
  }
}

// ══ API 유틸 ════════════════════════════════════════
async function apiFetch(method, params) {
  let url = API_URL;
  const opts = { method };
  if (method === 'GET') {
    const qs = new URLSearchParams(params).toString();
    url += '?' + qs;
  } else {
    opts.body = JSON.stringify(params);
  }
  const r = await fetch(url, opts);
  return r.json();
}

// ══ 토스트 ══════════════════════════════════════════
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2600);
}
</script>
</body>
</html>
